<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechNova | João Silva</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo */
    .logo {
      width: 72px;
      height: 72px;
      background: #1e2a4a;
      border: 2px solid #2d4080;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7c9cff;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    /* Identity */
    .identity { text-align: center; margin-bottom: 20px; }
    .company {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #e2e8f0;
      text-transform: uppercase;
    }
    .title {
      font-size: 14px;
      color: #7c9cff;
      font-weight: 500;
      margin-top: 4px;
    }
    .name {
      font-size: 13px;
      color: #64748b;
      margin-top: 2px;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #1e2a4a;
      width: 40px;
      margin: 0 0 20px;
    }

    /* Contact rows */
    .contacts {
      list-style: none;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #141426;
      border: 1px solid #1e2a4a;
      border-radius: 10px;
      padding: 10px 14px;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .contact-row:hover, .contact-row:focus {
      border-color: #7c9cff;
      background: #1a1a35;
      outline: none;
    }

    .contact-icon { font-size: 18px; flex-shrink: 0; }

    .contact-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .contact-label {
      font-size: 10px;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .contact-value {
      font-size: 13px;
      color: #cbd5e1;
    }

    /* Save button */
    .btn-save {
      background: #7c9cff;
      color: #0f0f1a;
      padding: 12px 32px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: opacity 0.15s;
      margin-bottom: 32px;
    }
    .btn-save:hover { opacity: 0.88; }

    /* QR section */
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-label {
      font-size: 11px;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    #qr-canvas {
      border-radius: 8px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <main class="card">

    <!-- Logo -->
    <div class="logo" aria-label="Logo da empresa">T</div>

    <!-- Identity -->
    <div class="identity">
      <h1 class="company">TECHNOVA</h1>
      <p class="title">Diretor de Produto</p>
      <p class="name">João Silva</p>
    </div>

    <hr class="divider">

    <!-- Contact rows -->
    <ul class="contacts" role="list">
      <li>
        <a href="tel:+351912345678" class="contact-row">
          <span class="contact-icon" aria-hidden="true">📞</span>
          <div class="contact-text">
            <span class="contact-label">Telefone</span>
            <span class="contact-value">+351 912 345 678</span>
          </div>
        </a>
      </li>
      <li>
        <a href="mailto:joao.silva@technova.pt" class="contact-row">
          <span class="contact-icon" aria-hidden="true">✉</span>
          <div class="contact-text">
            <span class="contact-label">Email</span>
            <span class="contact-value">joao.silva@technova.pt</span>
          </div>
        </a>
      </li>
      <li>
        <a href="https://technova.pt" target="_blank" rel="noopener noreferrer" class="contact-row">
          <span class="contact-icon" aria-hidden="true">🌐</span>
          <div class="contact-text">
            <span class="contact-label">Website</span>
            <span class="contact-value">technova.pt</span>
          </div>
        </a>
      </li>
    </ul>

    <!-- Save contact CTA -->
    <a href="contact.vcf" download class="btn-save">
      ⬇ Guardar Contacto
    </a>

    <!-- QR Code -->
    <div class="qr-section">
      <p class="qr-label">Partilhar este cartão</p>
      <canvas id="qr-canvas"></canvas>
    </div>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qr-canvas'), {
      text: window.location.href,
      width: 160,
      height: 160,
      colorDark: '#7c9cff',
      colorLight: '#0f0f1a',
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
